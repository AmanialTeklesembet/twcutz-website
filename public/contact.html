<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kontakt | TW'Cutz</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body data-page="contact">
    <header class="site-header">
      <a class="brand" href="/"><span class="brand-mark">TW</span><span>TW'Cutz</span></a>
      <nav class="desktop-nav" aria-label="Main navigation">
        <a href="/" data-page-link="home" data-i18n="navHome">Hjem</a>
        <a href="/gallery.html" data-page-link="gallery" data-i18n="navGallery">Arbeid</a>
        <a href="/services.html" data-page-link="services" data-i18n="navServices">Tjenester</a>
        <a href="/about.html" data-page-link="about" data-i18n="navAbout">Om</a>
        <a href="/booking.html" data-page-link="booking" data-i18n="navBooking">Booking</a>
        <a href="/contact.html" data-page-link="contact" data-i18n="navContact">Kontakt</a>
      </nav>
      <div class="header-actions"><div class="language-switch"><button class="lang-btn active" type="button" data-lang="no">NO</button><button class="lang-btn" type="button" data-lang="en">EN</button></div></div>
    </header>
    <main>
      <section class="page-hero"><p class="eyebrow" data-i18n="contactEyebrow">Contact</p><h1 data-i18n="contactTitle">Kontakt</h1></section>
      <section class="section contact-layout">
        <div><p data-i18n="contactCopy">Send en melding, eller gå direkte til Instagram for rask kontakt.</p><a class="btn ghost" href="https://www.instagram.com/twcutz1/" target="_blank" rel="noreferrer">Instagram</a></div>
        <form class="form-panel" id="contactForm">
          <label><span data-i18n="fieldName">Navn</span><input name="name" required></label>
          <label><span data-i18n="fieldContact">E-post eller telefon</span><input name="contact" required></label>
          <label><span data-i18n="fieldMessage">Melding</span><textarea name="message" rows="5" required></textarea></label>
          <button class="btn primary" type="submit" data-i18n="sendMessage">Send melding</button>
          <p class="form-status" id="contactStatus" role="status"></p>
        </form>
      </section>
    </main>
    <footer class="site-footer"><span>TW'Cutz</span><a href="/admin.html">Admin</a><a href="https://www.instagram.com/twcutz1/" target="_blank" rel="noreferrer">@twcutz1</a></footer>
    <script src="/app.js"></script>
  </body>
</html>
